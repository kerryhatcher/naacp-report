name: Deploy report site

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege: only `contents: read` at the workflow level; the deploy job
# gets the pages/id-token write scopes it alone needs.
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # This workflow never pushes back to the repo; don't leave the token
          # in .git/config where later steps or artifacts could pick it up.
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Generator tests and lint
        working-directory: generator
        run: |
          uv run pytest
          uv run ruff check .

      - name: Build report data
        working-directory: generator
        run: uv run build.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Web tests and typecheck
        working-directory: web
        run: |
          npm test
          npm run check

      - name: Build web app
        working-directory: web
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Security scans

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '17 6 * * 1' # weekly, Monday 06:17 UTC

permissions:
  contents: read

# Eight scanners run in parallel. Each fails its job on findings.
# Scanners that support custom rules also carry an org-name rule
# (pattern written as n[a]acp in configs so rule files don't match
# themselves; see .github/security/).
jobs:
  trivy:
    name: Trivy (vuln + secret + misconfig)
    runs-on: ubuntu-latest
    env:
      TRIVY_VERSION: 0.72.0
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Trivy
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" | tar xz -C "$RUNNER_TEMP/bin" trivy
      - name: Scan
        run: |
          "$RUNNER_TEMP/bin/trivy" fs \
            --scanners vuln,secret,misconfig \
            --secret-config .github/security/trivy-secret.yaml \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            .

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: 8.30.1
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Gitleaks
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz -C "$RUNNER_TEMP/bin" gitleaks
      - name: Scan
        run: |
          "$RUNNER_TEMP/bin/gitleaks" dir . \
            --config .github/security/gitleaks.toml \
            --no-banner --redact -v --exit-code 1

  rusty-hog:
    name: Rusty Hog (duroc_hog)
    runs-on: ubuntu-latest
    env:
      RUSTY_HOG_VERSION: 1.0.11
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install duroc_hog
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          curl -sSfL -o "$RUNNER_TEMP/rh.zip" "https://github.com/newrelic/rusty-hog/releases/download/v${RUSTY_HOG_VERSION}/rustyhogs-musl-duroc_hog-${RUSTY_HOG_VERSION}.zip"
          unzip -q -j "$RUNNER_TEMP/rh.zip" -d "$RUNNER_TEMP/bin"
          chmod +x "$RUNNER_TEMP/bin/duroc_hog"
      - name: Scan (default rules)
        run: |
          "$RUNNER_TEMP/bin/duroc_hog" -a .github/security/rusty-hog-allowlist.json . > "$RUNNER_TEMP/findings.json"
          jq . "$RUNNER_TEMP/findings.json"
          test "$(jq length "$RUNNER_TEMP/findings.json")" -eq 0
      - name: Scan (org-name rule)
        run: |
          "$RUNNER_TEMP/bin/duroc_hog" -a .github/security/rusty-hog-allowlist.json \
            --regex .github/security/rusty-hog-org-rule.json . > "$RUNNER_TEMP/findings.json"
          jq . "$RUNNER_TEMP/findings.json"
          test "$(jq length "$RUNNER_TEMP/findings.json")" -eq 0

  kingfisher:
    name: Kingfisher
    runs-on: ubuntu-latest
    env:
      KINGFISHER_VERSION: 1.108.0
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Kingfisher
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          curl -sSfL "https://github.com/mongodb/kingfisher/releases/download/v${KINGFISHER_VERSION}/kingfisher-linux-x64.tgz" | tar xz -C "$RUNNER_TEMP/bin" kingfisher
      - name: Scan
        # Exit codes: 0 = clean, 200/205 = findings (fails the step).
        # Git history is scanned by Gitleaks-style tools on the working
        # tree here; history scanning is disabled because the org-name
        # rule would flag pre-rename history forever.
        run: |
          "$RUNNER_TEMP/bin/kingfisher" scan . \
            --rules-path .github/security/kingfisher-rules.yml \
            --git-history none \
            --no-update-check

  detect-secrets:
    name: detect-secrets
    runs-on: ubuntu-latest
    env:
      DETECT_SECRETS_VERSION: 1.5.0
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install detect-secrets
        run: pip install "detect-secrets==${DETECT_SECRETS_VERSION}"
      - name: Scan
        # The plugin is copied out of the tree so the interpreter's
        # __pycache__ isn't created inside the scan root mid-scan.
        run: |
          cp .github/security/detect_secrets_org_plugin.py "$RUNNER_TEMP/org_plugin.py"
          detect-secrets scan --all-files \
            -p "$RUNNER_TEMP/org_plugin.py" \
            --exclude-files 'package-lock\.json$|(^|/)\.git/' > "$RUNNER_TEMP/findings.json"
          jq .results "$RUNNER_TEMP/findings.json"
          test "$(jq '.results | length' "$RUNNER_TEMP/findings.json")" -eq 0

  ripsecrets:
    name: ripsecrets
    runs-on: ubuntu-latest
    env:
      RIPSECRETS_VERSION: 0.1.11
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install ripsecrets
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          curl -sSfL "https://github.com/sirwart/ripsecrets/releases/download/v${RIPSECRETS_VERSION}/ripsecrets-${RIPSECRETS_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz -C "$RUNNER_TEMP/bin" --strip-components=1
      - name: Scan
        # Exits non-zero when secrets are found. No capture group in the
        # extra pattern, so matches are reported without a randomness test.
        run: |
          "$RUNNER_TEMP/bin/ripsecrets" --additional-pattern '(?i)n[a]acp'

  cloakrs:
    name: cloakrs (PII)
    runs-on: ubuntu-latest
    env:
      CLOAKRS_VERSION: 0.3.0
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install cloakrs
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          curl -sSfL "https://github.com/kadir/cloakrs/releases/download/v${CLOAKRS_VERSION}/cloakrs-v${CLOAKRS_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz -C "$RUNNER_TEMP/bin"
      - name: Scan
        # The org-name deny list is generated at runtime (case-sensitive
        # literals, so common case variants are listed) and lives outside
        # the checkout so the literal never appears in the repo. cloakrs
        # exits 0 even with findings, so the gate is a jq count that skips
        # lockfiles and benign-for-a-public-site types (Url, Hostname,
        # UserPath).
        run: |
          U="NA""ACP"
          L=$(printf '%s' "$U" | tr '[:upper:]' '[:lower:]')
          T="Na""acp"
          printf 'deny_list = ["%s", "%s", "%s"]\n' "$U" "$L" "$T" > "$RUNNER_TEMP/cloakrs-ci.toml"
          rc=0
          "$RUNNER_TEMP/bin/cloakrs" audit . \
            --recursive --respect-gitignore \
            --config "$RUNNER_TEMP/cloakrs-ci.toml" \
            --output-format json --output "$RUNNER_TEMP/cloakrs.json" || rc=$?
          # Exit 1 just means findings were written (gated below); >=2 is a
          # real runtime error.
          if [ "$rc" -ge 2 ]; then exit "$rc"; fi
          jq '{total_findings, findings_by_type}' "$RUNNER_TEMP/cloakrs.json"
          count=$(jq '[.files[]
              | select(.path | test("(^|/)(package-lock\\.json|uv\\.lock)$") | not)
              | .findings_by_type | to_entries[]
              | select(.key | IN("Url","Hostname","UserPath") | not)
              | .value] | add // 0' "$RUNNER_TEMP/cloakrs.json")
          echo "gated findings: $count"
          test "$count" -eq 0

  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    env:
      TRUFFLEHOG_VERSION: 3.95.9
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install TruffleHog
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          curl -sSfL "https://github.com/trufflesecurity/trufflehog/releases/download/v${TRUFFLEHOG_VERSION}/trufflehog_${TRUFFLEHOG_VERSION}_linux_amd64.tar.gz" | tar xz -C "$RUNNER_TEMP/bin" trufflehog
      - name: Scan
        run: |
          printf '.git/\n' > "$RUNNER_TEMP/th-exclude.txt"
          "$RUNNER_TEMP/bin/trufflehog" filesystem . \
            --config .github/security/trufflehog.yaml \
            --exclude-paths "$RUNNER_TEMP/th-exclude.txt" \
            --no-update --fail
